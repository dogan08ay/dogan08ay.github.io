<!DOCTYPE html>
<html>
<head>
    <title>doganpay Ödeme</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <h1>doganpay Ödeme Sistemi</h1>
    <button id="payButton" style="padding: 15px 30px; font-size: 18px; cursor: pointer;">Ödemeyi Başlat</button>
    <p id="msg"></p>

    <script>
        const msg = document.getElementById('msg');
        
        // 1. Pi SDK Başlatma
        window.Pi.init({ version: "2.0", sandbox: true });

        // 2. Ödeme Butonu
        document.getElementById('payButton').addEventListener('click', async () => {
            try {
                msg.innerText = "Kimlik doğrulanıyor...";
                
                // ÖNCE authenticate fonksiyonunu çağırıp 'payments' yetkisini almalıyız
                const user = await window.Pi.authenticate(['username', 'payments'], () => {
                    msg.innerText = "Kimlik doğrulama başarısız.";
                });

                msg.innerText = "Ödeme başlatılıyor...";

                // ŞİMDİ ödeme oluşturabiliriz
                const payment = await window.Pi.createPayment({
                    amount: 1.0, 
                    memo: "Test Ödemesi",
                    metadata: { paymentId: "test_123" }
                }, {
                    onReadyForServerApproval: (paymentId) => {
                        msg.innerText = "Sunucu onayı bekleniyor...";
                        fetch('/api/approve', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ paymentId: paymentId })
                        });
                    },
                    onReadyForServerCompletion: (paymentId, txid) => {
                        msg.innerText = "Ödeme Başarılı: " + txid;
                    },
                    onCancel: () => msg.innerText = "Ödeme iptal edildi.",
                    onError: (error) => msg.innerText = "Hata: " + JSON.stringify(error)
                });
            } catch (err) {
                msg.innerText = "Hata: " + err.message;
            }
        });
    </script>
</body>
</html>
