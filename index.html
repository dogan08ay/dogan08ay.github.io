<!DOCTYPE html>
<html>
<head>
    <title>doganpay Ödeme</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <h1>doganpay Ödeme Sistemi</h1>
    <button id="payButton" style="padding: 15px 30px; font-size: 18px; cursor: pointer;">Ödemeyi Başlat</button>
    <p id="msg" style="color: blue;"></p>

    <script>
        const msg = document.getElementById('msg');
        window.Pi.init({ version: "2.0", sandbox: true });

        // Sert temizlik: Sayfa her yüklendiğinde eski ödemeyi iptal etmeye çalış
        window.Pi.getIncompletePayment().then(payment => {
            if (payment) {
                console.log("Askıda kalan işlem tespit edildi, iptal ediliyor...");
                payment.cancel();
            }
        });

        document.getElementById('payButton').addEventListener('click', async () => {
            try {
                // 'payments' yetkisini al
                const user = await window.Pi.authenticate(['username', 'payments'], () => {
                    throw new Error("Doğrulama reddedildi.");
                });

                msg.innerText = "Ödeme başlatılıyor...";

                const payment = await window.Pi.createPayment({
                    amount: 0.1, // Test miktarını düşürdük
                    memo: "Test Ödemesi",
                    metadata: { paymentId: "test_" + Date.now() } // Her seferinde benzersiz ID
                }, {
                    onReadyForServerApproval: (id) => {
                        msg.innerText = "Onay bekleniyor...";
                        fetch('/api/approve', { method: 'POST', body: JSON.stringify({ paymentId: id }) });
                    },
                    onReadyForServerCompletion: (id, txid) => { msg.innerText = "Başarılı: " + txid; },
                    onCancel: () => msg.innerText = "İptal edildi.",
                    onError: (e) => msg.innerText = "Hata: " + JSON.stringify(e)
                });
            } catch (err) {
                msg.innerText = "Hata: " + err.message;
            }
        });
    </script>
</body>
</html>
