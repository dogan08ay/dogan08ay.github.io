<!DOCTYPE html>
<html>
<head>
    <title>DoganPay</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body>
    <h1>DoganPay</h1>
    <button id="payButton">Ödeme Yap</button>

    <script>
        const Pi = window.Pi;
        Pi.init({ version: "2.0", sandbox: true });

        document.getElementById('payButton').addEventListener('click', async () => {
            try {
                // Önemli: Her seferinde eski bir ödeme varsa temizle
                // Bu kısım senin sürekli aldığın hatayı tetikleyen "askıdaki ödemeyi" çözer
                const payments = await Pi.getIncompletePayment();
                if (payments) {
                    await Pi.closeIncompletePayment(payments.identifier);
                }

                // Yeni ödeme oluştur
                await Pi.createPayment({
                    amount: 0.1,
                    memo: "Test Ödeme",
                    metadata: { note: "Deneme" }
                }, {
                    onReadyForServer: (paymentId) => { console.log(paymentId); },
                    onCancel: (paymentId) => { alert("İptal edildi"); },
                    onError: (error, paymentId) => { alert("Hata: " + error); }
                });
            } catch (err) {
                alert("Sistem Hatası: " + err);
            }
        });
    </script>
</body>
</html>
