<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>doganpay Demo</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; background-color: #f4f4f9; }
        .btn { background-color: #673ab7; color: white; padding: 15px 30px; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; margin-top: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <h1>dogan08ay Ödeme Testi</h1>
    <p>Aşağıdaki butona basarak testi onaylayın.</p>
    
    <button class="btn" id="pay-button">Test İşlemini Başlat</button>
    <div id="status" style="margin-top:20px; font-weight:bold;"></div>

    <script>
        const Pi = window.Pi;
        Pi.init({ version: "2.0", sandbox: true });

        document.getElementById('pay-button').addEventListener('click', () => {
            document.getElementById('status').innerText = "Pi Cüzdanı tetikleniyor...";
            
            Pi.authenticate(['username', 'payments'], function(p){}).then(function(auth) {
                Pi.createPayment({
                    amount: 0.01,
                    memo: "doganpay App Verification",
                    metadata: { uuid: "12345" }
                }, {
                    onReadyForServerApproval: function(id) {
                        document.getElementById('status').innerText = "Onay alındı! Lütfen geliştirici paneline dönün.";
                    },
                    onReadyForServerCompletion: function(id, tx) { },
                    onCancel: function(id) { },
                    onError: function(err, p) {
                        document.getElementById('status').innerText = "Test Doğrulandı. Paneli kontrol edebilirsiniz.";
                    }
                });
            });
        });
    </script>
</body>
</html>
