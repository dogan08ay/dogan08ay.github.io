<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>DoganPay</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body>
    <h1>DoganPay Test</h1>
    <button id="payButton" style="padding: 20px; font-size: 20px;">Ödeme Yap</button>

    <script>
        const Pi = window.Pi;
        Pi.init({ version: "2.0", sandbox: true });

        document.getElementById('payButton').addEventListener('click', () => {
            Pi.authenticate(["payments"], (user) => {
                Pi.createPayment({
                    amount: 0.1,
                    memo: "Test Ödeme",
                    metadata: { type: "test" }
                }, {
                    onReadyForServer: (p) => alert("Sunucu hazır."),
                    onCancel: (p) => alert("İptal edildi."),
                    onError: (e, p) => alert("Hata: " + e),
                    onComplete: (p) => alert("Başarılı!")
                });
            }, (e) => alert("Giriş hatası: " + e));
        });
    </script>
</body>
</html>
