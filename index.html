<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>DoganPay</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body>
    <h1>DoganPay Test</h1>
    <button id="payButton" style="padding: 20px; font-size: 20px;">Ödeme Yap</button>

    <script>
        const Pi = window.Pi;
        
        // SDK'yı başlat
        Pi.init({ version: "2.0", sandbox: true });

        document.getElementById('payButton').addEventListener('click', () => {
            alert("Ödeme süreci başlıyor... Lütfen bekleyin.");
            
            try {
                Pi.createPayment({
                    amount: 0.1,
                    memo: "Test Ödeme",
                    metadata: { type: "test" }
                }, {
                    onReadyForServer: (paymentId) => { 
                        alert("Sunucu ile bağlantı kuruldu. Onay ekranı açılıyor...");
                    },
                    onCancel: (paymentId) => { 
                        alert("Ödeme kullanıcı tarafından iptal edildi."); 
                    },
                    onError: (error, paymentId) => { 
                        alert("HATA OLUŞTU: " + error); 
                    },
                    onComplete: (paymentId) => { 
                        alert("Ödeme Başarılı! ID: " + paymentId); 
                    }
                });
            } catch (e) {
                alert("Kod Hatası: " + e.message);
            }
        });
    </script>
</body>
</html>
