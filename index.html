<!DOCTYPE html>
<html>
<head>
    <title>doganpay</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body>
    <h1>doganpay</h1>
    <button id="payButton" style="padding: 20px; font-size: 20px;">Ödemeyi Başlat</button>

    <script>
        const Pi = window.Pi;
        // BURASI ÇOK ÖNEMLİ: 'payments' yetkisini burada istiyoruz
        Pi.init({ version: "2.0", sandbox: true });

        document.getElementById('payButton').addEventListener('click', async () => {
            try {
                const payment = await Pi.createPayment({
                    amount: 1.0,
                    memo: "Test",
                    metadata: { paymentId: "test_123" }
                }, {
                    onReadyForServerApproval: (paymentId) => {
                        console.log("Onay bekleniyor:", paymentId);
                    },
                    onReadyForServerCompletion: (paymentId, txid) => {
                        console.log("Tamamlandı:", txid);
                    },
                    onError: (err) => alert("Hata: " + JSON.stringify(err))
                });
            } catch (err) {
                alert("Ödeme Hatası: " + err.message);
            }
        });
    </script>
</body>
</html>
