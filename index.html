<!DOCTYPE html>
<html>
<head>
    <title>DoganPay</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body>
    <h1>DoganPay</h1>
    <button id="payButton">Ödeme Yap</button>

    <script>
        const Pi = window.Pi;
        Pi.init({ version: "2.0", sandbox: true });

        document.getElementById('payButton').addEventListener('click', () => {
            Pi.createPayment({
                amount: 0.1,
                memo: "Test",
                metadata: { type: "test" }
            }, {
                onReadyForServer: (paymentId) => { console.log(paymentId); },
                onCancel: (paymentId) => { alert("İptal edildi"); },
                onError: (error, paymentId) => { alert("Hata: " + error); },
                onComplete: (paymentId) => { alert("Başarılı!"); }
            });
        });
    </script>
</body>
</html>
