<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>doganpay Ödeme Testi</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; background-color: #f4f4f9; }
        .btn { background-color: #673ab7; color: white; padding: 15px 30px; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; margin-top: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        #status { margin-top: 20px; font-weight: bold; color: #333; }
    </style>
</head>
<body>

    <h1>doganpay Test Ödemesi</h1>
    <p>Lütfen aşağıdaki butona basıp adımları takip edin.</p>
    
    <button class="btn" id="pay-button">0.1 Test Pi Gönder</button>
    <div id="status">İşlemi başlatmak için butona basın.</div>

    <script>
        const Pi = window.Pi;
        Pi.init({ version: "2.0", sandbox: true });

        document.getElementById('pay-button').addEventListener('click', () => {
            document.getElementById('status').innerText = "Bağlantı kuruluyor...";
            
            Pi.authenticate(['username', 'payments'], function(payment) {
                // Tamamlanmamış ödeme kontrolü
            }).then(function(auth) {
                document.getElementById('status').innerText = "Cüzdan yükleniyor, lütfen bekleyin...";
                
                Pi.createPayment({
                    amount: 0.1,
                    memo: "doganpay Testnet Dogrulama",
                    metadata: { orderId: "12345" }
                }, {
                    onReadyForServerApproval: function(paymentId) {
                        document.getElementById('status').innerText = "Cüzdan şifrenizi girerek işlemi onaylayın.";
                    },
                    onReadyForServerCompletion: function(paymentId, txid) {
                        document.getElementById('status').innerText = "Tebrikler! İşlem tamamlandı. Geliştirici paneline dönebilirsiniz.";
                    },
                    onCancel: function(paymentId) {
                        document.getElementById('status').innerText = "İşlem iptal edildi.";
                    },
                    onError: function(error, payment) {
                        document.getElementById('status').innerText = "Hata oluştu. Lütfen tekrar deneyin.";
                    }
                });
            });
        });
    </script>
</body>
</html>
