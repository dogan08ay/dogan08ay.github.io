<!DOCTYPE html>
<html>
<head>
    <title>Pi Payment</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body>

    <button id="pay-btn" onclick="requestPayment()">Sistemi Doğrula (Tıkla)</button>

    <script>
        // Pi SDK Başlatma
        Pi.init({ version: "2.0", sandbox: false });

        function requestPayment() {
            Pi.createPayment({
                amount: 0.1,
                memo: "Test Payment",
                metadata: { type: "test" }
            }, {
                onReadyForServerApproval: function(paymentId) {
                    // Pi cüzdanı bu aşamada ödemeyi onaylamanızı ister
                },
                onReadyForServerCompletion: function(paymentId, txid) {
                    // İşlem blokzincirde tamamlandığında burası çalışır
                },
                onCancel: function(paymentId) {
                    // Kullanıcı iptal ederse
                },
                onError: function(error, payment) {
                    // Bir hata olursa
                }
            });
        }
    </script>
</body>
</html>
