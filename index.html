<!DOCTYPE html>
<html>
<head>
    <title>doganpay Ödeme</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body>
    <h1>doganpay Ödeme Sistemi</h1>
    <button id="payButton">Ödemeyi Başlat</button>

    <script>
        const Pi = window.Pi;
        Pi.init({ version: "2.0", sandbox: true });

        document.getElementById('payButton').addEventListener('click', async () => {
            try {
                const payment = await Pi.createPayment({
                    amount: 1.0, // Ödeme miktarı
                    memo: "Test Ödemesi",
                    metadata: { paymentId: "test_123" }
                }, {
                    onReadyForServerApproval: (paymentId) => {
                        console.log("Ödeme hazır, sunucuya gönderiliyor:", paymentId);
                        // Burada Pi'ye ödemeyi onaylaması için sinyal gider
                    },
                    onReadyForServerCompletion: (paymentId, txid) => {
                        console.log("Ödeme tamamlandı!");
                    },
                    onCancel: (paymentId) => {
                        console.log("Ödeme iptal edildi.");
                    },
                    onError: (error, paymentId) => {
                        console.error("Hata oluştu:", error);
                    }
                });
            } catch (err) {
                console.error("Ödeme başlatılamadı:", err);
            }
        });
    </script>
</body>
</html>
