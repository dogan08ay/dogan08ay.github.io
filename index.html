<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body>

    <h2 id="msg">Sistem yükleniyor...</h2>

    <script>
        // Pi SDK'yı başlat
        Pi.init({ version: "2.0", sandbox: false });

        // SDK'nın hazır olmasını bekle ve öyle butonu göster
        window.addEventListener('load', function() {
            document.getElementById('msg').innerText = "Sistem Hazır!";
            
            // Butonu kodla oluşturuyoruz ki tarayıcı butonun bir Pi ödeme butonu olduğunu anlasın
            var btn = document.createElement("button");
            btn.innerHTML = "Ödeme Yap";
            btn.onclick = function() {
                Pi.createPayment({
                    amount: 0.1,
                    memo: "Verification",
                    metadata: { type: "verification" }
                }, {
                    onReadyForServerApproval: function(paymentId) {
                        alert("Ödeme ekranı açılıyor...");
                    },
                    onError: function(error, payment) {
                        alert("Hata: " + error.message);
                    }
                });
            };
            document.body.appendChild(btn);
        });
    </script>
</body>
</html>
